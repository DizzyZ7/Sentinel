name: Sentinel Local Security Scan
description: Scan changed Python and JavaScript/TypeScript files without executing repository source.
author: DizzyZ7

inputs:
  path:
    description: Repository-relative directory to scan.
    required: false
    default: .
  changed-only:
    description: Scan only Git-changed and untracked files.
    required: false
    default: "true"
  base-ref:
    description: Optional local Git ref used for three-dot changed-file comparison.
    required: false
    default: ""
  baseline:
    description: Optional Sentinel local JSON baseline path.
    required: false
    default: ""
  fail-on:
    description: never, any, or new.
    required: false
    default: new
  fail-confidence:
    description: Static confidence threshold for a blocking candidate.
    required: false
    default: "0.80"
  min-confidence:
    description: Minimum static confidence included in reports.
    required: false
    default: "0.00"
  report-path:
    description: JSON evidence report path.
    required: false
    default: sentinel-local-scan.json
  sarif-path:
    description: SARIF report path.
    required: false
    default: sentinel-local-scan.sarif

outputs:
  report-path:
    description: Path to the generated JSON report.
    value: ${{ inputs.report-path }}
  sarif-path:
    description: Path to the generated SARIF report.
    value: ${{ inputs.sarif-path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip

    - name: Install Sentinel local CLI
      shell: bash
      run: |
        python -m pip install --disable-pip-version-check "pathspec>=0.12,<1"
        python -m pip install --disable-pip-version-check --no-deps "${{ github.action_path }}"

    - name: Run Sentinel local scan
      shell: bash
      env:
        SENTINEL_SCAN_PATH: ${{ inputs.path }}
        SENTINEL_CHANGED_ONLY: ${{ inputs.changed-only }}
        SENTINEL_BASE_REF: ${{ inputs.base-ref }}
        SENTINEL_BASELINE: ${{ inputs.baseline }}
        SENTINEL_FAIL_ON: ${{ inputs.fail-on }}
        SENTINEL_FAIL_CONFIDENCE: ${{ inputs.fail-confidence }}
        SENTINEL_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        SENTINEL_REPORT_PATH: ${{ inputs.report-path }}
        SENTINEL_SARIF_PATH: ${{ inputs.sarif-path }}
      run: |
        set -euo pipefail
        args=(
          scan "$SENTINEL_SCAN_PATH"
          --fail-on "$SENTINEL_FAIL_ON"
          --fail-confidence "$SENTINEL_FAIL_CONFIDENCE"
          --min-confidence "$SENTINEL_MIN_CONFIDENCE"
          --format text
          --json-output "$SENTINEL_REPORT_PATH"
          --sarif-output "$SENTINEL_SARIF_PATH"
        )
        if [[ "$SENTINEL_CHANGED_ONLY" == "true" ]]; then
          args+=(--changed-only)
          if [[ -z "$SENTINEL_BASE_REF" && -n "${GITHUB_BASE_REF:-}" ]]; then
            if [[ "$(git rev-parse --is-shallow-repository)" == "true" ]]; then
              git -c core.hooksPath=/dev/null -c core.fsmonitor=false fetch --no-tags --prune --unshallow origin
            else
              git -c core.hooksPath=/dev/null -c core.fsmonitor=false fetch --no-tags --prune origin "$GITHUB_BASE_REF"
            fi
            SENTINEL_BASE_REF="origin/$GITHUB_BASE_REF"
          fi
        fi
        if [[ -n "$SENTINEL_BASE_REF" ]]; then
          args+=(--base-ref "$SENTINEL_BASE_REF")
        fi
        if [[ -n "$SENTINEL_BASELINE" ]]; then
          args+=(--baseline "$SENTINEL_BASELINE")
        fi
        sentinel "${args[@]}"

branding:
  icon: shield
  color: blue
