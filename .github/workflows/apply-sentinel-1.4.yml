name: apply-sentinel-1.4

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'codex/sentinel-1.4'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out head branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-1.4

      - name: Verify and apply release payload
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .sentinel-1.4.part-00 \
            .sentinel-1.4.part-01 \
            .sentinel-1.4.part-02 \
            .sentinel-1.4.part-03 \
            .sentinel-1.4.part-04 \
            .sentinel-1.4.part-05 \
            .sentinel-1.4.part-06 \
            .sentinel-1.4.part-07 \
            .sentinel-1.4.part-08 \
            .sentinel-1.4.part-09 \
            .sentinel-1.4.part-10 \
            .sentinel-1.4.part-11 \
            .sentinel-1.4.part-12 \
            .sentinel-1.4.part-13 \
            .sentinel-1.4.part-14 \
            > /tmp/sentinel-1.4.tar.gz
          echo "947020f9c8734ccf4b51a7c3fbc6888f413d0807106320ee7dad942fdb1b8155  /tmp/sentinel-1.4.tar.gz" | sha256sum -c -
          tar -tzf /tmp/sentinel-1.4.tar.gz > /tmp/sentinel-1.4-files.txt
          test "$(wc -l < /tmp/sentinel-1.4-files.txt)" -eq 27
          tar -xzf /tmp/sentinel-1.4.tar.gz
          while IFS= read -r path; do
            git add -- "$path"
          done < /tmp/sentinel-1.4-files.txt
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sentinel 1.4: immutable security policy profiles"
          git push origin HEAD:codex/sentinel-1.4
