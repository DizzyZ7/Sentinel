name: bootstrap-sentinel-2.0.1

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-2.0.1-competition-hardening
          fetch-depth: 0

      - name: Rebuild reviewed hardening overlay
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-* > /tmp/overlay.b64
          base64 --decode /tmp/overlay.b64 > /tmp/overlay.tar.gz
          echo "5d62b4179bec41e9f8e9c03dc8bb1683f13bc8b26b9c0742f8c0cb8a4defdb9a  /tmp/overlay.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/overlay.tar.gz
          rm -rf .bootstrap
          git diff --check

      - name: Commit competition hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: harden competition judge path"
          git push origin HEAD:codex/sentinel-2.0.1-competition-hardening
