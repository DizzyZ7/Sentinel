name: apply-sentinel-1.5

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'codex/sentinel-1.5'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out head branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-1.5

      - name: Verify and apply release payload
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .sentinel-1.5.part-00 \
            .sentinel-1.5.part-01 \
            .sentinel-1.5.part-02 \
            .sentinel-1.5.part-03 \
            .sentinel-1.5.part-04 \
            .sentinel-1.5.part-05 \
            .sentinel-1.5.part-06 \
            > /tmp/sentinel-1.5.tar.gz
          echo "a4d5093042d7e85d734778ef0c38d9c958ea3ec79152b5a21568c5078baad56c  /tmp/sentinel-1.5.tar.gz" | sha256sum -c -
          tar -tzf /tmp/sentinel-1.5.tar.gz > /tmp/sentinel-1.5-files.txt
          test "$(wc -l < /tmp/sentinel-1.5-files.txt)" -eq 24
          if grep -Eq '(^/|(^|/)\.\.(/|$))' /tmp/sentinel-1.5-files.txt; then
            echo "Unsafe path in release payload" >&2
            exit 1
          fi
          tar -xzf /tmp/sentinel-1.5.tar.gz
          while IFS= read -r path; do
            git add -- "$path"
          done < /tmp/sentinel-1.5-files.txt
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sentinel 1.5: governed risk acceptance and security exceptions"
          git push origin HEAD:codex/sentinel-1.5
