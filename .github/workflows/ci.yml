name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

      - name: Run Ruff
        run: ruff check app tests scripts

      - name: Run validation pack
        run: >-
          python -m scripts.run_evals
          --output /tmp/sentinel-validation-pack.json
          --fail-on-regression

      - name: Upload validation pack
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-validation-pack
          path: /tmp/sentinel-validation-pack.json
          if-no-files-found: error
          retention-days: 14

      - name: Run local CLI self-scan
        run: >-
          sentinel scan .
          --fail-on never
          --format json
          --output /tmp/sentinel-local-scan.json
          --sarif-output /tmp/sentinel-local-scan.sarif
          --quiet

      - name: Verify local CLI evidence
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from app.services.local_scan import verify_report_sha256

          report = json.loads(Path("/tmp/sentinel-local-scan.json").read_text(encoding="utf-8"))
          sarif = json.loads(Path("/tmp/sentinel-local-scan.sarif").read_text(encoding="utf-8"))
          assert report["schema_version"] == "sentinel-local-scan-v1"
          assert report["app_version"] == "2.2.1"
          assert report["safety"]["source_executed"] is False
          assert report["safety"]["dependencies_installed"] is False
          assert report["safety"]["patches_applied"] is False
          assert verify_report_sha256(report)
          assert sarif["version"] == "2.1.0"
          assert sarif["runs"][0]["tool"]["driver"]["semanticVersion"] == "2.2.1"
          PY

      - name: Upload local CLI evidence
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-local-cli
          path: |
            /tmp/sentinel-local-scan.json
            /tmp/sentinel-local-scan.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Check release readiness
        run: python -m scripts.check_release --output /tmp/sentinel-release-readiness.json

      - name: Upload release readiness
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-release-readiness
          path: /tmp/sentinel-release-readiness.json
          if-no-files-found: error
          retention-days: 14

      - name: Validate demo compose
        run: docker compose -f compose.demo.yml config --quiet

      - name: Build container
        run: docker build --tag sentinel:ci .

      - name: Verify judge fixture is packaged
        run: docker run --rm --entrypoint /bin/sh sentinel:ci -c 'test -f /app/demo/judge-demo/confirmed_sql.py'

      - name: Start clean judge smoke stack
        shell: bash
        run: |
          set -euo pipefail
          docker network create sentinel-ci
          docker run -d --name sentinel-ci-db --network sentinel-ci \
            -e POSTGRES_DB=sentinel \
            -e POSTGRES_USER=sentinel \
            -e POSTGRES_PASSWORD=sentinel \
            postgres:17-alpine
          for attempt in $(seq 1 40); do
            if docker exec sentinel-ci-db pg_isready -U sentinel -d sentinel; then
              break
            fi
            if [ "$attempt" -eq 40 ]; then
              docker logs sentinel-ci-db
              exit 1
            fi
            sleep 1
          done
          mkdir -p "$RUNNER_TEMP/sentinel-ci-data"
          chmod 0777 "$RUNNER_TEMP/sentinel-ci-data"
          docker run -d --name sentinel-ci-api --network sentinel-ci \
            -p 127.0.0.1:8000:8000 \
            -e DATABASE_URL=postgresql+asyncpg://sentinel:sentinel@sentinel-ci-db:5432/sentinel \
            -e DATA_DIR=/data \
            -e OPENAI_API_KEY= \
            -e LLM_ENABLED=true \
            --read-only \
            --tmpfs /tmp:size=64m,mode=1777 \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            -v "$RUNNER_TEMP/sentinel-ci-data:/data" \
            sentinel:ci
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              docker logs sentinel-ci-api
              exit 1
            fi
            sleep 1
          done

      - name: Verify complete judge path
        run: >-
          sentinel-verify-judge
          --base-url http://127.0.0.1:8000
          --timeout 120
          --output /tmp/sentinel-judge-smoke.json

      - name: Upload judge smoke result
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-judge-smoke
          path: /tmp/sentinel-judge-smoke.json
          if-no-files-found: error
          retention-days: 14

      - name: Build draft submission pack
        shell: bash
        run: |
          set -euo pipefail
          version="$(python -c 'from app.core.version import APP_VERSION; print(APP_VERSION)')"
          python -m scripts.build_submission_pack \
            --output-dir /tmp/sentinel-submission-pack \
            --archive "/tmp/sentinel-submission-pack-${version}.zip" \
            --source-date-epoch "$(git show -s --format=%ct HEAD)" \
            --evidence /tmp/sentinel-validation-pack.json \
            --evidence /tmp/sentinel-local-scan.json \
            --evidence /tmp/sentinel-local-scan.sarif \
            --evidence /tmp/sentinel-release-readiness.json \
            --evidence /tmp/sentinel-judge-smoke.json

      - name: Upload draft submission pack
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-submission-pack-draft
          path: |
            /tmp/sentinel-submission-pack-*.zip
            /tmp/sentinel-submission-pack/metadata/SUBMISSION_MANIFEST.json
            /tmp/sentinel-submission-pack/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Show judge smoke logs on failure
        if: failure()
        run: |
          docker logs sentinel-ci-api || true
          docker logs sentinel-ci-db || true

      - name: Stop judge smoke stack
        if: always()
        run: |
          docker rm -f sentinel-ci-api sentinel-ci-db || true
          docker network rm sentinel-ci || true
