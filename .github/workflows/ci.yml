name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' | tee /tmp/sentinel-pytest-output.txt
          import app.main
          print(f"app.main={app.main.__file__}")
          for route in app.main.app.routes:
              print(route.path, sorted(getattr(route, "methods", set())))
          PY
          pytest -q 2>&1 | tee -a /tmp/sentinel-pytest-output.txt

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-pytest-diagnostics
          path: /tmp/sentinel-pytest-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Run Ruff
        run: ruff check app tests scripts

      - name: Run deterministic evaluation
        run: >-
          python -m scripts.run_evals
          --output /tmp/sentinel-eval-results.json
          --fail-on-regression

      - name: Upload evaluation result
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-static-eval
          path: /tmp/sentinel-eval-results.json
          if-no-files-found: error
          retention-days: 14

      - name: Check release readiness
        run: python -m scripts.check_release --output /tmp/sentinel-release-readiness.json

      - name: Upload release readiness
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-release-readiness
          path: /tmp/sentinel-release-readiness.json
          if-no-files-found: error
          retention-days: 14

      - name: Validate demo compose
        run: docker compose -f compose.demo.yml config --quiet

      - name: Build container
        run: docker build --tag sentinel:ci .

      - name: Verify judge fixture is packaged
        run: docker run --rm --entrypoint /bin/sh sentinel:ci -c 'test -f /app/demo/judge-demo/confirmed_sql.py'
