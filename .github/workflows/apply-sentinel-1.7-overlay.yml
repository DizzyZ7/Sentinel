name: apply-sentinel-1.7-overlay

on:
  push:
    branches: [codex/sentinel-1.7-posture-trends]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-1.7-posture-trends
          fetch-depth: 0

      - name: Rebuild reviewed overlay
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/sentinel-1.7.b64
          for sha in \
            e936f76adb6af7a4e30bace2afc319fcf06c4c7a \
            4ff84fd0bceffd1d69ded33674301e40bb34f408 \
            c69687e5f6e0857d490e3308815dabcd4c92e03f \
            b21c47b397f063168ece93fedbcf2375a20a1706 \
            7f03e16a75300fafd42a23c092ef16a7c90e2e50 \
            75463210206765191e1f1b8d59d8edb2b4301a83 \
            d88e4a4624d0de30673cacbe3c03a64dd34e092a \
            5c768b54c26c1dba5b580209aa20e31875d2adac \
            9d9fdc4dba2f92d0731ddcafd257b2ffa9a0f390 \
            cce8ef56c2ee41b82b4b69eba54688fc5cb0e06f
          do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq .content \
              | tr -d '\n' \
              | base64 -d >> /tmp/sentinel-1.7.b64
          done
          base64 -d /tmp/sentinel-1.7.b64 > /tmp/sentinel-1.7-overlay.tar.gz
          echo "de54431a094d23cf15c94ef32eb56495381480ee9e933167c8ab9c3f03c2cf07  /tmp/sentinel-1.7-overlay.tar.gz" | sha256sum -c -
          tar -xzf /tmp/sentinel-1.7-overlay.tar.gz -C .

      - name: Commit product slice
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md app docs pyproject.toml tests
          git diff --cached --check
          git commit -m "Sentinel 1.7: security posture trends and remediation effectiveness"
          git push origin HEAD:codex/sentinel-1.7-posture-trends
