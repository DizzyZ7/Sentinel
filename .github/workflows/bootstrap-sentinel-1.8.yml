name: bootstrap-sentinel-1.8

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-1.8-objectives-forecasting
          fetch-depth: 0

      - name: Rebuild reviewed product overlay
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/sentinel-1.8.b64
          for sha in \
            a280139d1049f518bcb577c1818f877c269c2344 \
            1becbaeeed0ea2e939647601994100cc7a5184bd \
            8098c6776ea722fef329481be46bce5db955f322 \
            648c7b5a1f2c5a59b0a490f8bcfdc1e5db46f320 \
            cd234b84df492d0e7b181d926614a026e1b5a25c \
            e8d897b679bbad072b0d125a1de8e2ad673b482e \
            de3d813f03b434e7e357fbebba3533b7c07682d8 \
            18e4b3e5cc8ed49013b7fb28bc135c665828772b \
            1addb940decc31ef4c8c411e428e843ee2b96cce \
            536a3813b8df09f6a712d864b754e48f64002ee2
          do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq .content \
              | tr -d '\n' \
              | base64 -d >> /tmp/sentinel-1.8.b64
          done
          base64 -d /tmp/sentinel-1.8.b64 > /tmp/sentinel-1.8-overlay.tar.gz
          echo "7aea7a732565ee41a1054f583a8b7ed7b25e4b99cc4f4617f97d4bec9e346fd7  /tmp/sentinel-1.8-overlay.tar.gz" | sha256sum -c -
          tar -xzf /tmp/sentinel-1.8-overlay.tar.gz -C .

      - name: Commit product slice
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            README.md \
            app/core/version.py \
            app/main.py \
            app/models/__init__.py \
            app/models/security_objective.py \
            app/routers/comparison.py \
            app/routers/demo.py \
            app/routers/evidence.py \
            app/routers/scans.py \
            app/routers/security_objective.py \
            app/schemas/evidence.py \
            app/schemas/security_objective.py \
            app/services/evidence.py \
            app/services/release_readiness.py \
            app/services/security_objective.py \
            app/templates/security_objective_report.html \
            app/templates/security_objectives.html \
            docs/ARCHITECTURE.md \
            docs/BUILD_LOG.md \
            docs/EVIDENCE_BUNDLE.md \
            docs/SECURITY_OBJECTIVES.md \
            pyproject.toml \
            tests/test_evidence_bundle.py \
            tests/test_security_objective.py \
            tests/test_security_objective_api.py
          git diff --cached --check
          git commit -m "Sentinel 1.8: security objectives and remediation forecasting"
          git push origin HEAD:codex/sentinel-1.8-objectives-forecasting
