name: bootstrap-sentinel-2.0

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: codex/sentinel-2.0-control-plane
          fetch-depth: 0

      - name: Rebuild reviewed product overlay
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-* > /tmp/overlay.b64
          base64 --decode /tmp/overlay.b64 > /tmp/overlay.tar.gz
          echo "a62bd9ae859f7b3a178a486ceb3818bdccceef14465909fff8c616427e2119f0  /tmp/overlay.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/overlay.tar.gz
          rm -rf .bootstrap
          git diff --check

      - name: Commit product slice
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add continuous security control plane"
          git push origin HEAD:codex/sentinel-2.0-control-plane
