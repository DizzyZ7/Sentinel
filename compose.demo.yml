services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - sentinel_demo_postgres:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

  api:
    image: ghcr.io/dizzyz7/sentinel:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@db:5432/sentinel
      DATA_DIR: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      LLM_ENABLED: ${LLM_ENABLED:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - sentinel_demo_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  sentinel_demo_postgres:
  sentinel_demo_data:
